version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: contabilidade_postgres
    restart: always
    environment:
      POSTGRES_USER: contabilidade_user
      POSTGRES_PASSWORD: contabilidade_pass
      POSTGRES_DB: contabilidade_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: